name: Build desktop packages

on:
  workflow_dispatch:

jobs:
  build-packages:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact-name: windows-bundles
            bundle-glob: src-tauri/target/release/bundle/**/*
          - name: Linux
            os: ubuntu-22.04
            artifact-name: linux-bundles
            bundle-glob: src-tauri/target/release/bundle/**/*
          - name: macOS Apple Silicon
            os: macos-latest
            artifact-name: macos-aarch64-bundles
            bundle-glob: src-tauri/target/aarch64-apple-darwin/release/bundle/**/*
            tauri-args: --target aarch64-apple-darwin
          - name: macOS Intel
            os: macos-latest
            artifact-name: macos-x86_64-bundles
            bundle-glob: src-tauri/target/x86_64-apple-darwin/release/bundle/**/*
            tauri-args: --target x86_64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundles
        run: pnpm tauri:build ${{ matrix.tauri-args }}

      - name: Upload packaged bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.bundle-glob }}
          if-no-files-found: error
          retention-days: 14
